<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Nero Micro-Blogging</title>
    <script>
      // GitHub Pages SPA redirect trick
      // When a 404 occurs, redirect to index.html with the path encoded as a query param
      // so the app can read it and navigate to the correct route client-side.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').join('/') +
        (l.search ? '&q=' + l.search.slice(1).split('&').join('&') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
